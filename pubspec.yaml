name: techair_2_0
description: TechAir 2.0 — gestão de assistência técnica multiempresa.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.11.0
  cloud_firestore: ^6.6.0
  firebase_auth: ^6.5.4
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.5
  pdf: ^3.12.0
  printing: ^5.14.3
  signature: ^6.3.0
  excel: ^4.0.6
  file_picker: ^11.0.2
  flutter_svg: ^2.2.0
  image_picker: ^1.1.2
  firebase_storage: ^13.4.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/branding/techair_logo.png
  adaptive_icon_background: '#071522'
  adaptive_icon_foreground: assets/branding/techair_logo.png
  min_sdk_android: 21
